name: hexschool

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smis
      POSTGRES_PASSWORD: smis
      POSTGRES_DB: smis
      TZ: UTC
      PGTZ: UTC
    ports:
      # host 5433 → container 5432 (5433 avoids clashing with a native install)
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smis -d smis']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the default bucket on first boot, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/smis
      "

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # web UI
    environment:
      TZ: UTC

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://smis:smis@postgres:5432/smis
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-only-access-secret-change-in-prod-0000000000
      JWT_REFRESH_SECRET: dev-only-refresh-secret-change-in-prod-000000000
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_DEFAULT: smis
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: 'HexSchool <no-reply@hexschool.local>'
      CORS_ORIGINS: http://localhost:3000
      SETTINGS_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      ADMIN_DASH_USER: admin
      ADMIN_DASH_PASS: admin-dev-pass
      TZ: UTC
    ports:
      - '4000:4000'
    volumes:
      - ./src:/app/src
    command: npm run start:dev

volumes:
  postgres_data:
  redis_data:
  minio_data:
